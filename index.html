<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mangelmelder Heimburg</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#E31D2A">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --hb-red: #E31D2A;
            --hb-yellow: #FFD700;
            --hb-bg: #FDFDFD;
            --text: #2D3436;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #F0F2F5;
            margin: 0; padding: 0;
            display: flex; justify-content: center;
        }

        .container {
            width: 100%; max-width: 550px;
            background: white; min-height: 100vh;
            box-shadow: 0 4px 25px rgba(0,0,0,0.1);
        }

        header {
            background: linear-gradient(135deg, var(--hb-red) 0%, #b3121b 100%);
            color: white; padding: 30px 20px; text-align: center;
            border-bottom: 6px solid var(--hb-yellow);
            border-radius: 0 0 25px 25px;
        }

        header img { width: 80px; background: white; padding: 8px; border-radius: 50%; margin-bottom: 10px; }
        
        form { padding: 20px; }
        
        .section-title {
            color: var(--hb-red); font-weight: bold; font-size: 1.1rem;
            border-bottom: 2px solid #F0F0F0; margin: 25px 0 15px 0; padding-bottom: 5px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.9rem; }
        
        input, textarea, select {
            width: 100%; padding: 12px; border: 2px solid #EEE;
            border-radius: 10px; font-size: 1rem; box-sizing: border-box;
            background-color: #FAFAFA;
        }

        input:focus { border-color: var(--hb-red); outline: none; background: white; }

        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }

        .hidden { display: none; }
        
        .photo-box {
            background-color: #FFFDE7; padding: 15px; border-radius: 15px;
            border: 2px dashed var(--hb-yellow); margin: 20px 0;
        }

        .btn-submit {
            width: 100%; background: var(--hb-red); color: white;
            padding: 18px; border: none; border-radius: 12px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
        }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 20px; text-align: center; border: 4px solid var(--hb-yellow);
        }
        .btn-go { background: var(--hb-red); color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="icon-192.png" alt="Wappen Heimburg" onerror="this.style.display='none'">
        <h2>Mangelmelder Heimburg</h2>
    </header>

    <form id="maengelForm">
        <div class="section-title">Wer meldet den Mangel?</div>
        <div class="form-group">
            <label>Name, Vorname *</label>
            <input type="text" id="name" required>
        </div>
        <div class="row">
            <div class="form-group">
                <label>E-Mail *</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Telefon</label>
                <input type="tel" id="telefon">
            </div>
        </div>

        <div class="section-title">Was und Wo?</div>
        <div class="form-group">
            <label>Art des Mangels *</label>
            <select id="kategorie" required>
                <option value="">Bitte wählen...</option>
                <option>Straßenbeleuchtung</option>
                <option>Straßenschäden / Schlagloch</option>
                <option>Gehwegschäden</option>
                <option>Wilder Müll / Deponie</option>
                <option>Spielplatz / Grünanlagen</option>
                <option>Schilder / Markierung</option>
                <option>Vandalismus</option>
                <option>Sonstiges</option>
            </select>
        </div>

        <div class="form-group">
            <label>Straße und ggf. Hausnummer</label>
            <input type="text" id="strasse">
        </div>
        
        <div class="form-group">
            <label>Ecke Straße</label>
            <input type="text" id="ecke" placeholder="z.B. Hauptstraße / Kreuzweg">
        </div>

        <div class="form-group">
            <label>Beschreibung / Bemerkung</label>
            <textarea id="beschreibung" rows="3"></textarea>
        </div>

        <div class="form-group">
            <label>Bereits an anderer Stelle gemeldet?</label>
            <select id="gemeldet" onchange="toggleGemeldet()">
                <option value="Nein">Nein</option>
                <option value="Ja">Ja</option>
            </select>
        </div>

        <div id="gemeldetDetails" class="hidden">
            <div class="row">
                <div class="form-group">
                    <label>Wann? (Datum)</label>
                    <input type="date" id="gemeldetWann">
                </div>
                <div class="form-group">
                    <label>Wem gemeldet?</label>
                    <input type="text" id="gemeldetWem" placeholder="z.B. Bauhof, Polizei">
                </div>
            </div>
        </div>

        <div class="photo-box">
            <label style="color: var(--hb-red); font-weight: bold;">📷 Fotos (max. 5)</label>
            <p style="font-size: 0.75rem; margin-bottom: 10px;">Bilder werden automatisch in Ihrer Galerie gespeichert.</p>
            <input type="file" accept="image/*" capture="environment" style="margin-bottom:5px">
            <input type="file" accept="image/*" capture="environment" style="margin-bottom:5px">
            <input type="file" accept="image/*" capture="environment" style="margin-bottom:5px">
            <input type="file" accept="image/*" capture="environment" style="margin-bottom:5px">
            <input type="file" accept="image/*" capture="environment">
        </div>

        <button type="submit" class="btn-submit">E-Mail vorbereiten</button>
    </form>
</div>

<div id="infoModal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="color: var(--hb-red);">Fast fertig!</h3>
        <p>Ihre Daten sind bereit. Bitte hängen Sie im nächsten Schritt Ihre <strong>Fotos in der E-Mail manuell an</strong>.</p>
        <button id="modalGo" class="btn-go">Verstanden & E-Mail öffnen</button>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    function toggleGemeldet() {
        const val = document.getElementById('gemeldet').value;
        document.getElementById('gemeldetDetails').className = (val === 'Ja') ? '' : 'hidden';
    }

    const form = document.getElementById('maengelForm');
    const modal = document.getElementById('infoModal');

    form.addEventListener('submit', (e) => { e.preventDefault(); modal.style.display = 'flex'; });

    document.getElementById('modalGo').addEventListener('click', () => {
        const d = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            tel: document.getElementById('telefon').value,
            kat: document.getElementById('kategorie').value,
            str: document.getElementById('strasse').value,
            eck: document.getElementById('ecke').value,
            besch: document.getElementById('beschreibung').value,
            alt: document.getElementById('gemeldet').value,
            wann: document.getElementById('gemeldetWann').value,
            wem: document.getElementById('gemeldetWem').value
        };

        const empfaenger = "lue-heim@web.de, ortsbuero.heimburg@blankenburg.de";
        const betreff = `Mangel Heimburg: ${d.kat} - ${d.str || d.eck}`;
        
        let body = `Meldung von: ${d.name}\nKontakt: ${d.email} / ${d.tel}\n\n`;
        body += `Art des Mangels: ${d.kat}\n`;
        body += `Ort: ${d.str ? d.str : ''} ${d.eck ? '(Ecke: '+d.eck+')' : ''}\n\n`;
        body += `Beschreibung:\n${d.besch}\n\n`;
        body += `Bereits gemeldet: ${d.alt}`;
        if(d.alt === 'Ja') body += `\nAm: ${d.wann}\nBei: ${d.wem}`;
        body += `\n\n--- BITTE FOTOS JETZT ANHÄNGEN ---`;

        window.location.href = `mailto:${empfaenger}?subject=${encodeURIComponent(betreff)}&body=${encodeURIComponent(body)}`;
        modal.style.display = 'none';
    });
</script>
</body>
</html>
